$def with(events)

$var title: $_('Shelly Cloud Integration')
$var page: plugins

<script>
    var statusRefreshTimer = null;

    function refreshStatus() {
        jQuery.getJSON("/plugins/shelly_cloud_integrator/status_json", {_: new Date().getTime()}, function(data) {
            if (data && data.events) {
                var statusText = data.events.join("\n");
                var statusBox = jQuery("#statusEvents");
                if (!statusBox.is(":focus") && statusBox.val() !== statusText) {
                    statusBox.val(statusText);
                }
            }
        });
    }

    // Initialize behaviors
    jQuery(document).ready(function(){
        jQuery("button#cCancel").click(function(){
            window.location="/";
        });
        refreshStatus();
        statusRefreshTimer = setInterval(refreshStatus, 5000);
    });

    jQuery(window).on("beforeunload", function() {
        if (statusRefreshTimer) {
            clearInterval(statusRefreshTimer);
        }
    });
</script>

<div id="plugin">
    <div class="title">$_('Shelly Cloud Integration')</div>
    <p><a href=$plugins.plugin_url('shelly_cloud_integrator.help_page') class="button upload">$_('Help')</a></p>
    <p>
        <a href=$plugins.plugin_url('shelly_cloud_integrator.sensors_page') class="button submit">$_('Setup')</a>
        <a href="?reset&$csrf_query()" class="button cancel danger">$_('Reset devices')</a>
    </p><br/>
    <div id="pluginStatus">
        <table class="optionList">
            <tr>
                <td style='text-transform: none;'>$_('Status'):</td>
                <td>
                    <textarea id="statusEvents" style="font-family: monospace;" rows="20" cols="150" readonly>$'\n'.join(events)</textarea>
                </td>
            </tr>
        </table>
    </div>
</div>
<div id="controls">
    <button id="cCancel" class="cancel danger">$_('Cancel')</button>
</div>
