$def with(plugin_options, events)

$var title: $_('Remote Notifications')
$var page: plugins

<style>
.switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 24px;
}

.switch input {
    display: none;
}

.slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: #ff4d4d;
    transition: 0.4s;
    border-radius: 34px;
}

.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    border-radius: 50%;
    left: 4px;
    bottom: 3px;
    background-color: white;
    transition: 0.4s;
}

input:checked + .slider {
    background-color: #4caf50;
}

input:checked + .slider:before {
    transform: translateX(26px);
}
</style>

<script>
    // Initialize behaviors
    jQuery(document).ready(function(){

        jQuery("#cSubmit").click(function() {
            jQuery("#pluginForm").submit();
        });
        jQuery("button#cCancel").click(function(){
            window.location="/";
        });
        jQuery("#cTest").click(function() {
            jQuery("#pluginForm").attr('action', "$plugins.plugin_url('remote_notifications.settings_page')?test&$csrf_query()")
            jQuery("#pluginForm").submit();
        });
        jQuery("#toggleApi").click(function() {
            var api = jQuery("#remoteApi");
            var isHidden = api.attr("type") === "password";
            api.attr("type", isHidden ? "text" : "password");
            jQuery(this).text(isHidden ? "$_('Hide')" : "$_('Show')");
        });

    });
</script>

<div id="plugin">
    <div class="title">$_('Remote Notifications')</div>
    <a href=$plugins.plugin_url('remote_notifications.help_page') class="button upload">$_(u'Help')</a><br/>
    <form id="pluginForm" action="$plugins.plugin_url('remote_notifications.settings_page')" method="post">
        $:csrf_input()
        <table class="optionList">
            <tr>
                <td style='text-transform: none;'>$_('Use plugin'):</td>
                <td>
                    <label class="switch">
                        <input name='use' type='checkbox'${" checked" if plugin_options['use'] else ""}>
                        <span class="slider"></span>
                    </label>
                </td>
            </tr>
            <tr>
                <td style='text-transform: none;'>$_('Remote server address'):</td>
                <td>
                    <input name='rem_adr' type='text' value='$plugin_options["rem_adr"]'> ($_('ex: https://server.com/automatOSPy/'))
                </td>
            </tr>
            <tr>
                <td style='text-transform: none;'>$_('API for access'):</td>
                <td>
                    <input id="remoteApi" name='api' type='password' value='$plugin_options["api"]'>
                    <button id="toggleApi" type="button" class="button backup">$_('Show')</button>
                </td>
            </tr>
            <tr>
                <td style='text-transform: none;'>$_('Status'):</td>
                <td>
                    <textarea style="font-family: monospace;" rows="7" cols="35" readonly>$'\n'.join(events)</textarea>
                </td>
            </tr>
        </table>
    </form>
</div>
<div id="controls">
    <button id="cSubmit" class="submit"><b>$_('Submit')</b></button>
    <button id="cTest" class="submit"><b>$_('Send test data to server')</b></button>
    <button id="cCancel" class="cancel danger">$_('Cancel')</button>
</div>
