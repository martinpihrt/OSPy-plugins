$def with(signal_names)

$var title: $_('Signaling Examples settings')
$var page: plugins

<script>
    function updateLog(){
        jQuery.getJSON("/plugins/signaling_examples/signal_json", function(_data) {
            var loginfoArray = _data.loginfo || [];
            loginfoArray.reverse();
            jQuery("#Textarea").val(loginfoArray.join("\n"));
            jQuery("#LastSignal").val(_data.last_signal || "");
        })
        setTimeout(updateLog, 1000); // 1 second
    }

    // Initialize behaviors
    jQuery(document).ready(function(){
        jQuery("#cSubmit").click(function() {
            jQuery("#pluginForm").submit();
        });
        jQuery("button#cCancel").click(function(){
            window.location="/";
        });
        updateLog();
    });
</script>

<div id="plugin">
    <div class="title">$_('Signaling Examples settings')</div>
    <a href=$plugins.plugin_url('signaling_examples.help_page') class="button upload">$_('Help')</a><br/>
    <form id="pluginForm" action="$plugins.plugin_url('signaling_examples.settings_page')" method="post">
        $:csrf_input()
        <table class="optionList">
            <tr>
                <td style='text-transform: none;'>$_('Last signal'):</td>
                <td>
                    <input id="LastSignal" type="text" size="80" readonly>
                </td>
            </tr>
            <tr>
                <td style='text-transform: none;'>$_('Status'):</td>
                <td>
                    <textarea id="Textarea" style="font-family: monospace;" rows="10" cols="55" readonly></textarea>
                </td>
            </tr>
            <tr>
                <td style='text-transform: none; vertical-align: top;'>$_('Signals'):</td>
                <td>
                    <textarea style="font-family: monospace;" rows="12" cols="55" readonly>$'\n'.join(["signal('{}')".format(name) for name in signal_names])</textarea>
                </td>
            </tr>
        </table>
    </form>
</div>

<div id="controls">
    <button id="cSubmit" class="submit"><b>$_('Submit')</b></button>
    <button id="cCancel" class="cancel danger">$_('Cancel')</button>
</div>
